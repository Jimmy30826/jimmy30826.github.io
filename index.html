<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jimmy - Engineering</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background: #020202;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            user-select: none;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #111 0%, #020202 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1.2s ease;
        }

        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-top: 2px solid #00ff88;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #progress-bar {
            width: 0%;
            height: 1px;
            background: #00ff88;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        /* 3D Canvas Canvas */
        #canvas-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50;
            /* Ensure this is ALWAYS above the business card before it breaks */
            transition: filter 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            /* For slow blur out */
        }

        #canvas-wrapper.blurred {
            filter: blur(10px) brightness(0.5);
            /* Lighter blur so train front is visible */
        }

        /* Camera Shake Animation */
        .shake {
            animation: explodeShake 0.5s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes explodeShake {
            0% {
                transform: translate(0, 0) scale(1.0);
            }

            10% {
                transform: translate(-80px, -50px) scale(1.15);
            }

            20% {
                transform: translate(60px, 70px) scale(1.1);
            }

            30% {
                transform: translate(-70px, 40px) scale(1.12);
            }

            40% {
                transform: translate(50px, -60px) scale(1.05);
            }

            50% {
                transform: translate(-40px, 30px) scale(1.08);
            }

            60% {
                transform: translate(30px, -20px) scale(1.02);
            }

            100% {
                transform: translate(0, 0) scale(1.0);
            }
        }

        /* Glass Fracture Overlay */
        #glass-crack {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 150vw;
            height: 150vh;
            transform: translate(-50%, -50%) scale(1);
            /* No scale animation */
            pointer-events: none;
            z-index: 1800;
            opacity: 0;
            background-image: radial-gradient(circle at center, transparent 30%, rgba(0, 0, 0, 0.8) 100%);
            /* NO TRANSITION: Instant pop */
        }

        /* Portfolio Accordion */
        .portfolio-section {
            width: 100%;
            margin-top: 15px;
            border-top: 1px dashed #eaeaea;
            padding-top: 15px;
        }

        .portfolio-toggle {
            font-size: 10px;
            color: #888;
            letter-spacing: 1px;
            text-align: center;
            cursor: pointer;
            transition: color 0.3s;
            user-select: none;
            font-weight: 600;
        }

        .portfolio-toggle:hover {
            color: #00ff88;
        }

        .portfolio-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0, 1, 0, 1), opacity 0.3s ease, margin 0.3s;
            opacity: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 0;
        }

        .portfolio-content.open {
            max-height: 500px;
            opacity: 1;
            margin-top: 15px;
            transition: max-height 0.8s ease-in-out, opacity 0.4s ease 0.1s, margin 0.3s;
        }

        .pf-text {
            font-size: 11px;
            color: #666;
            line-height: 1.6;
            text-align: justify;
        }

        .pf-text strong {
            color: #111;
        }

        .pf-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .pf-btn {
            background: #f8f8f8;
            border: 1px solid #ddd;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 10px;
            color: #444;
            text-decoration: none;
            transition: all 0.2s;
            font-weight: 500;
        }

        .pf-btn.primary {
            background: #00ff88;
            color: #fff;
            border-color: #00ff88;
        }

        .pf-btn:hover {
            background: #00ff88;
            color: #fff;
            border-color: #00ff88;
            box-shadow: 0 4px 10px rgba(0, 255, 136, 0.3);
        }

        #glass-crack.active {
            opacity: 1;
        }

        /* SVG lines drawn on the backdrop */
        .crack-line {
            stroke: rgba(255, 255, 255, 0.8);
            stroke-width: 2;
            fill: none;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.5));
        }

        /* Impact Flash */
        #impact-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: 3000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.05s ease;
        }

        #impact-flash.fade-out {
            transition: opacity 1.5s ease-out;
            opacity: 0;
        }

        /* Professional Minimalist Card - Always Behind the Canvas */
        #business-card-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            /* Hidden until shatter to prevent peeking during camera shake */
            justify-content: center;
            align-items: center;
            z-index: 10;
            /* Put behind the 3D canvas */
            background: rgba(0, 255, 136, 1);
            /* Solid green background */
        }

        .card-container {
            /* Fully rendered from frame 1. No fade-in or pop-up animations. */
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .professional-card {
            width: 360px;
            background: #ffffff;
            border-radius: 8px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 25px;
            background: #f0f0f0;
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-text h1 {
            font-size: 32px;
            margin: 0;
            color: #000;
            text-align: center;
        }

        .info-text p {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 8px 0 25px 0;
            text-align: center;
        }

        .card-footer {
            width: 100%;
            border-top: 1px solid #f0f0f0;
            padding-top: 20px;
            display: flex;
            justify-content: space-between;
        }

        .footer-item {
            font-size: 9px;
            color: #ccc;
            letter-spacing: 2px;
        }

        /* Dropdown Menu */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-toggle {
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .dropdown-toggle:hover {
            color: #00ff88;
        }

        .dropdown-menu {
            position: absolute;
            bottom: 100%;
            right: 0;
            background: #ffffff;
            min-width: 130px;
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.08);
            border-radius: 6px;
            padding: 8px 0;
            margin-bottom: 12px;
            visibility: hidden;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            z-index: 100;
        }

        /* Small bottom arrow pointing to the text */
        .dropdown-menu::after {
            content: '';
            position: absolute;
            top: 100%;
            right: 15px;
            border-width: 6px;
            border-style: solid;
            border-color: #ffffff transparent transparent transparent;
        }

        .dropdown:hover .dropdown-menu {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
        }

        .dropdown-menu a {
            display: block;
            padding: 8px 20px;
            color: #555;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 1px;
            transition: background 0.2s, color 0.2s;
            text-align: right;
            font-weight: 500;
        }

        .dropdown-menu a:hover {
            background: #fafafa;
            color: #00ff88;
        }

        /* Skip Guide */
        #skip-guide {
            position: fixed;
            bottom: 30px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 1500;
            transition: opacity 0.5s ease;
        }

        .skip-text {
            font-size: 10px;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
        }

        .progress-ring {
            width: 40px;
            height: 40px;
            transform: rotate(-90deg);
        }

        .progress-ring circle {
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
        }

        .ring-bg {
            stroke: rgba(255, 255, 255, 0.1);
        }

        .ring-fill {
            stroke: #00ff88;
            stroke-dasharray: 113.1;
            stroke-dashoffset: 113.1;
            transition: stroke-dashoffset 0.1s linear;
        }

        /* Screen Shards falling physics (Crumble/Gravity) */
        .screen-shard {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 2500;
            transition: transform 1.5s cubic-bezier(0.55, 0.05, 0.68, 0.19), opacity 1s ease 0.5s;
            will-change: transform, opacity;
            pointer-events: none;
        }

        canvas {
            display: block;
        }
    </style>
</head>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { ColladaLoader } from 'three/addons/loaders/ColladaLoader.js';

        let scene, camera, renderer, train, curve;
        let startTime, isStopped = false;
        const totalDuration = 15000; // Realistic weight

        let spacePressed = false, spaceHoldStart = 0;
        const skipHoldRequired = 2000;

        let skipIntro = false;

        // Use sessionStorage which is bulletproof across local files and servers
        if (sessionStorage.getItem('introCompleted') === 'true') {
            skipIntro = true;

            // Allow manual F5 / Reloads to replay the animation
            const nav = performance.getEntriesByType("navigation")[0];
            if ((nav && nav.type === "reload") || (performance.navigation && performance.navigation.type === 1)) {
                skipIntro = false;
            }
        }

        if (skipIntro) {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('canvas-wrapper').style.display = 'none';
            document.getElementById('glass-crack').style.display = 'none';
            document.getElementById('skip-guide').style.display = 'none';
            document.getElementById('business-card-layer').style.display = 'flex';
        } else {
            init();
        }

        function easeOutQuart(x) {
            return 1 - Math.pow(1 - x, 4);
        }

        function init() {
            renderer = new THREE.WebGLRenderer({
                antialias: true,
                powerPreference: "high-performance",
                preserveDrawingBuffer: true
            });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x020202, 1); // Solid background to hide the stationary card behind
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            document.getElementById('canvas-wrapper').appendChild(renderer.domElement);

            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x020202, 100, 1000);
            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 5000);
            camera.position.set(0, 2, 18);
            camera.lookAt(0, 2, -100);

            // Grid
            function createGridTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 128; canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 5;
                ctx.strokeRect(0, 0, 128, 128);
                const tex = new THREE.CanvasTexture(canvas);
                tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                tex.repeat.set(2000, 2000);
                return tex;
            }
            const grid = new THREE.Mesh(new THREE.PlaneGeometry(10000, 10000), new THREE.MeshBasicMaterial({ map: createGridTexture(), transparent: true, opacity: 0.8 }));
            grid.rotation.x = -Math.PI / 2;
            scene.add(grid);

            // "E233"
            function createNeonText(text) {
                const canvas = document.createElement('canvas');
                canvas.width = 512; canvas.height = 256;
                const ctx = canvas.getContext('2d');
                ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 20;
                ctx.fillStyle = '#00ff88'; ctx.font = 'bold 120px Outfit';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(text, 256, 128);
                return new THREE.CanvasTexture(canvas);
            }
            const textMesh = new THREE.Mesh(new THREE.PlaneGeometry(80, 40), new THREE.MeshBasicMaterial({ map: createNeonText('E233'), transparent: true, side: THREE.DoubleSide }));
            textMesh.position.set(0, 35, -400);
            scene.add(textMesh);

            scene.add(new THREE.AmbientLight(0xffffff, 3.5));
            const dl = new THREE.DirectionalLight(0xffffff, 2);
            dl.position.set(10, 20, 10);
            scene.add(dl);

            curve = new THREE.CatmullRomCurve3([
                new THREE.Vector3(120, 2, -140),
                new THREE.Vector3(60, 2, -120),
                new THREE.Vector3(25, 2, -95),
                new THREE.Vector3(8, 2, -75),
                new THREE.Vector3(0, 2, -50),
                new THREE.Vector3(0, 2, -20), // Added collinear point
                new THREE.Vector3(0, 2, 10),  // Added collinear point
                new THREE.Vector3(0, 2, 50),
                new THREE.Vector3(0, 2, 100)
            ]);
            curve.curveType = 'centripetal';

            const loader = new ColladaLoader();
            const progressBar = document.getElementById('progress-bar');
            loader.load('./img/★E233東海道線/model.dae', (collada) => {
                const model = collada.scene, box = new THREE.Box3().setFromObject(model), center = box.getCenter(new THREE.Vector3());
                train = new THREE.Group();
                train.add(model);
                model.position.set(-center.x, -center.y, -center.z);
                model.rotation.x = -Math.PI / 2;
                train.scale.set(0.35, 0.35, 0.35);
                model.traverse(node => { if (node.isMesh && node.material) Array.isArray(node.material) ? node.material.forEach(m => m.side = THREE.DoubleSide) : node.material.side = THREE.DoubleSide; });
                scene.add(train);
                setTimeout(() => { document.getElementById('loading-screen').classList.add('hidden'); startTime = performance.now(); animate(); }, 400);
            }, (xhr) => { if (xhr.lengthComputable) progressBar.style.width = (Math.round((xhr.loaded / xhr.total) * 100)) + '%'; });

            window.addEventListener('keydown', (e) => { if (e.code === 'Space' && !spacePressed && !isStopped) { spacePressed = true; spaceHoldStart = performance.now(); } });
            window.addEventListener('keyup', (e) => { if (e.code === 'Space') { spacePressed = false; document.getElementById('skip-progress').style.strokeDashoffset = '113.1'; } });
            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }

        function triggerCard() {
            if (isStopped) return;
            isStopped = true;

            // Mark intro as fully completed in the session to skip it immediately next time
            sessionStorage.setItem('introCompleted', 'true');

            const wrapper = document.getElementById('canvas-wrapper');
            const flash = document.getElementById('impact-flash');
            const crack = document.getElementById('glass-crack');
            const cardLayer = document.getElementById('business-card-layer');

            // Force a final render to ensure we have the exact frame for the picture
            renderer.render(scene, camera);

            // 1. Violent Impact: Glass crack instantly appears
            flash.style.transition = 'opacity 0.05s ease';
            flash.style.opacity = '1';
            wrapper.classList.add('shake');
            crack.classList.add('active');
            document.getElementById('skip-guide').classList.add('hidden');

            // Instantly start fading the flash so the screen is clear for the shatter
            setTimeout(() => {
                flash.style.transition = 'opacity 0.3s ease-out';
                flash.style.opacity = '0';
            }, 50);

            // 2. Screen falls apart (Shatter sequence)
            setTimeout(() => {

                // Capture the exact 3D scene frame as an image
                const imgData = renderer.domElement.toDataURL('image/webp', 0.9);

                // Instantly hide the real 3D canvas
                wrapper.style.display = 'none';

                // Allow the crack SVG to fall down gracefully alongside the shards
                crack.style.transition = 'opacity 1s ease-out, transform 1.5s cubic-bezier(0.55, 0.05, 0.68, 0.19)';
                crack.style.opacity = '0';
                crack.style.transform = 'translate(-50%, 100vh)';

                // Reveal the card waiting safely underneath (no fade, instant pop exactly when the canvas hides)
                cardLayer.style.display = 'flex';

                // Defines a mathematically perfect 32-piece radial shatter matching spiderweb fractures
                const C = '50% 50%';
                const I = ['35% 35%', '50% 25%', '65% 35%', '75% 50%', '65% 65%', '50% 75%', '35% 65%', '25% 50%'];
                const P = ['0 0', '25% 0', '50% 0', '75% 0', '100% 0', '100% 25%', '100% 50%', '100% 75%', '100% 100%', '75% 100%', '50% 100%', '25% 100%', '0 100%', '0 75%', '0 50%', '0 25%'];

                const polys = [];
                // Center burst (8 pieces)
                for (let i = 0; i < 8; i++) polys.push(`${C}, ${I[i]}, ${I[(i + 1) % 8]}`);

                // Outer peripheral fragments (24 pieces)
                polys.push(`${I[0]}, ${P[15]}, ${P[0]}`); polys.push(`${I[0]}, ${P[0]}, ${P[1]}`); polys.push(`${I[0]}, ${I[1]}, ${P[1]}`);
                polys.push(`${I[1]}, ${P[1]}, ${P[2]}`); polys.push(`${I[1]}, ${P[2]}, ${P[3]}`); polys.push(`${I[1]}, ${I[2]}, ${P[3]}`);
                polys.push(`${I[2]}, ${P[3]}, ${P[4]}`); polys.push(`${I[2]}, ${P[4]}, ${P[5]}`); polys.push(`${I[2]}, ${I[3]}, ${P[5]}`);
                polys.push(`${I[3]}, ${P[5]}, ${P[6]}`); polys.push(`${I[3]}, ${P[6]}, ${P[7]}`); polys.push(`${I[3]}, ${I[4]}, ${P[7]}`);
                polys.push(`${I[4]}, ${P[7]}, ${P[8]}`); polys.push(`${I[4]}, ${P[8]}, ${P[9]}`); polys.push(`${I[4]}, ${I[5]}, ${P[9]}`);
                polys.push(`${I[5]}, ${P[9]}, ${P[10]}`); polys.push(`${I[5]}, ${P[10]}, ${P[11]}`); polys.push(`${I[5]}, ${I[6]}, ${P[11]}`);
                polys.push(`${I[6]}, ${P[11]}, ${P[12]}`); polys.push(`${I[6]}, ${P[12]}, ${P[13]}`); polys.push(`${I[6]}, ${I[7]}, ${P[13]}`);
                polys.push(`${I[7]}, ${P[13]}, ${P[14]}`); polys.push(`${I[7]}, ${P[14]}, ${P[15]}`); polys.push(`${I[7]}, ${I[0]}, ${P[15]}`);

                // Generate and animate the falling shards
                polys.forEach((p, i) => {
                    const shard = document.createElement('div');
                    shard.className = 'screen-shard';
                    shard.style.backgroundImage = `url(${imgData})`;
                    shard.style.clipPath = `polygon(${p})`;
                    document.body.appendChild(shard);

                    const isInner = i < 8; // Center pieces break out first
                    const cascadeDelay = isInner ? Math.random() * 50 : 100 + Math.random() * 200;

                    setTimeout(() => {
                        const tx = (Math.random() - 0.5) * 100; // Minimal horizontal drift, mostly vertical collapse
                        const ty = window.innerHeight + 200 + Math.random() * 300; // Heavy fall downwards
                        const rotX = Math.random() * 720 - 360; // Tumble
                        const rotY = Math.random() * 720 - 360;
                        const rotZ = Math.random() * 90 - 45;

                        shard.style.transform = `translate3d(${tx}px, ${ty}px, 0) rotateX(${rotX}deg) rotateY(${rotY}deg) rotateZ(${rotZ}deg)`;
                        shard.style.opacity = '0';
                    }, cascadeDelay);
                });

                // Clear WebGL resources to save battery after shards fall
                setTimeout(() => { renderer.dispose(); }, 2000);

            }, 500); // Give the user exactly 0.5 seconds to register the "crack" before the screen completely caves in
        }

        function animate() {
            if (isStopped) return;
            requestAnimationFrame(animate);

            if (spacePressed) {
                const held = performance.now() - spaceHoldStart;
                const ratio = Math.min(held / skipHoldRequired, 1);
                document.getElementById('skip-progress').style.strokeDashoffset = (113.1 * (1 - ratio)).toString();
                if (held >= skipHoldRequired) triggerCard();
            }

            if (train && curve) {
                const elapsed = performance.now() - startTime;
                const rawT = (elapsed % totalDuration) / totalDuration;
                const easedT = easeOutQuart(rawT);

                const pos = curve.getPointAt(easedT);
                train.position.copy(pos);

                // Precise impact threshold: Stop at Z=2 so the train's front nose aligns with the camera (Z=18)
                if (pos.z > 2 && !isStopped) {
                    // Force exact stopping position and perfectly straight alignment
                    train.position.set(0, 2, 2);
                    train.lookAt(0, 2, 100);
                    triggerCard();
                    return;
                }

                if (!isStopped) {
                    const nextT = Math.min(easedT + 0.002, 0.999);
                    train.lookAt(curve.getPointAt(nextT));
                }
            }
            if (!isStopped) {
                renderer.render(scene, camera);
            }
        }
    </script>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>할리갈리 - Main Menu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Jua', sans-serif;
            overflow: hidden;
            background: linear-gradient(-45deg, #FF9A9E, #FECFEF, #fdfbfb, #ebedee);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 메인 메뉴 컨테이너 */
        #main-menu {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        .floating-icons {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .icon {
            position: absolute;
            font-size: 4rem;
            opacity: 0.7;
            user-select: none;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        .icon-1 { top: 15%; left: 10%; animation: float 6s ease-in-out infinite; }
        .icon-2 { top: 20%; right: 15%; animation: float 7s ease-in-out infinite 1s; }
        .icon-3 { top: 70%; left: 15%; animation: float 5s ease-in-out infinite 0.5s; font-size: 5rem; }
        .icon-4 { top: 60%; right: 10%; animation: float 8s ease-in-out infinite 2s; }
        .icon-5 { top: 85%; right: 40%; animation: float 6s ease-in-out infinite 1.5s; font-size: 3rem; }
        .icon-6 { top: 10%; left: 50%; animation: float 7s ease-in-out infinite 0.8s; font-size: 3.5rem; }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(15deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.25);
            border-radius: 30px;
            padding: 60px 80px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .title-container {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 6rem;
            color: #ffffff;
            text-shadow: 4px 4px 0px #FF6B6B, 8px 8px 20px rgba(0, 0, 0, 0.25);
            margin: 0;
            letter-spacing: 5px;
        }

        .difficulty-options {
            display: flex;
            gap: 20px;
            margin-bottom: 50px;
        }

        .difficulty-options input[type="radio"] {
            display: none;
        }

        .diff-btn {
            background-color: rgba(255, 255, 255, 0.4);
            color: #555;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 3px solid transparent;
            user-select: none;
        }

        .diff-btn:hover {
            background-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-3px);
            color: #333;
        }

        .difficulty-options input[type="radio"]:checked + .diff-btn {
            background-color: #ffffff;
            color: #FF6B6B;
            border: 3px solid #FF6B6B;
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
            transform: scale(1.1);
        }

        .start-btn {
            background-color: #FF6B6B;
            color: white;
            border: none;
            padding: 18px 70px;
            font-size: 2.5rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            font-family: 'Jua', sans-serif;
            position: relative;
            overflow: hidden;
            letter-spacing: 2px;
        }

        .start-btn:hover {
            transform: translateY(-6px) scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 107, 107, 0.6);
            background-color: #ff5252;
        }

        .start-btn:active {
            transform: translateY(2px) scale(0.98);
        }

        /* --- 게임 화면 스타일 --- */
        #game-screen {
            display: none; 
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #2E3B4E, #131A22); 
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .round-table {
            width: 85vmin;
            max-width: 800px;
            height: 85vmin;
            max-height: 800px;
            background: radial-gradient(circle at center, #388E3C, #1B5E20);
            border-radius: 50%;
            border: 24px solid #5D4037; 
            box-shadow: 0 35px 70px rgba(0,0,0,0.8), inset 0 0 60px rgba(0,0,0,0.6);
            position: relative;
            animation: zoomIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes zoomIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .bell-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
        }

        .bell {
            font-size: 6rem;
            user-select: none;
            filter: drop-shadow(0 25px 20px rgba(0,0,0,0.6));
            transition: transform 0.1s ease;
        }

        .bell-container:active .bell, .bell.active {
            transform: translateY(12px) scale(0.92);
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.6));
        }

        .deck, .flipped-card {
            position: absolute;
            width: 80px;
            height: 115px;
            border-radius: 8px;
            box-sizing: border-box;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0; 
            text-align: center;
        }

        .deck {
            background-color: #E53935;
            background-image: radial-gradient(#B71C1C 15%, transparent 16%), radial-gradient(#B71C1C 15%, transparent 16%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            border: 6px solid white;
            z-index: 5;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        /* 턴 표시 그로우 효과 */
        .spotlight {
            box-shadow: 0 0 30px 15px rgba(255, 235, 59, 0.8) !important;
            transform: translateX(-50%) translateY(-10px) !important;
            cursor: pointer;
        }

        .opponent-deck-shadow {
            box-shadow: 0 1px 0 #ddd, 0 2px 0 #fff, 0 3px 0 #ddd, 0 4px 0 #fff, 0 5px 0 #ddd, 0 6px 0 #fff, 0 30px 35px rgba(0,0,0,0.7);
        }

        .player-deck-shadow {
            box-shadow: 0 -1px 0 #ddd, 0 -2px 0 #fff, 0 -3px 0 #ddd, 0 -4px 0 #fff, 0 -5px 0 #ddd, 0 -6px 0 #fff, 0 -30px 35px rgba(0,0,0,0.7);
        }

        .opponent-deck { top: 5%; left: 50%; transform: translateX(-50%) rotate(180deg); }
        .player-deck { bottom: 5%; left: 50%; transform: translateX(-50%); }

        .card-count {
            position: absolute;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }
        /* 카드가 겹쳐서 가려지지 않도록 덱의 우측에 배치 (상대방은 180도 회전되었으므로 좌측에 배치하면 실제 화면 우측에 나옴) */
        .opponent-deck .card-count { left: -50px; bottom: 50%; transform: translateY(50%) rotate(180deg); }
        .player-deck .card-count { right: -50px; top: 50%; transform: translateY(-50%); }

        /* 뒤집어진 카드 (앞면) - 그리드로 과일 배치 UI */
        .flipped-card {
            background-color: white;
            border: 4px solid #ccc;
            z-index: 6;
            display: none; /* 카드가 있을 때만 flex */
            flex-wrap: wrap;
            align-content: center;
            justify-content: center;
            gap: 2px;
            padding: 2px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            overflow: hidden; /* 영역 밖으로 튀어나오는 과일 숨기기 */
        }

        .f-fruit {
            font-size: 1.4rem; /* 줄어든 카드 크기에 맞게 폰트 크기 감소 */
            line-height: 1; 
            margin: 1px;
            text-align: center;
        }

        .opponent-flipped { top: 25%; left: 50%; transform: translateX(-50%) rotate(180deg); }
        .player-flipped { bottom: 25%; left: 50%; transform: translateX(-50%); }

        /* 애니메이션 처리시 활용 */
        .anim-flip-player { animation: flipPlayer 0.4s ease-out forwards; }
        .anim-flip-opponent { animation: flipOpp 0.4s ease-out forwards; }

        @keyframes flipPlayer {
            0% { opacity: 0; bottom: 5%; transform: translateX(-50%) rotateY(180deg) scale(0.5); }
            100% { opacity: 1; bottom: 25%; transform: translateX(-50%) rotateY(0deg) scale(1); }
        }
        @keyframes flipOpp {
            0% { opacity: 0; top: 5%; transform: translateX(-50%) rotate(180deg) rotateY(-180deg) scale(0.5); }
            100% { opacity: 1; top: 25%; transform: translateX(-50%) rotate(180deg) rotateY(0deg) scale(1); }
        }

        /* 중앙 알림 텍스트 */
        #alert-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(1.5rem, 5vw, 4rem);
            color: #FFEB3B;
            text-shadow: 0 5px 20px rgba(0,0,0,0.8);
            background: rgba(0, 0, 0, 0.75);
            padding: 20px 30px;
            border-radius: 40px;
            text-align: center;
            max-width: 90vw;
            word-break: keep-all;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
        }

    </style>
</head>
<body>
    <div id="main-menu">
        <div class="floating-icons">
            <div class="icon icon-1">🍓</div>
            <div class="icon icon-2">🍌</div>
            <div class="icon icon-3">🛎️</div>
            <div class="icon icon-4">🍋</div>
            <div class="icon icon-5">🍇</div>
            <div class="icon icon-6">🍓</div>
        </div>
        <div class="glass-panel">
            <div class="title-container"><h1>할리갈리</h1></div>
            
            <div class="difficulty-options">
                <input type="radio" id="easy" name="difficulty" value="easy">
                <label for="easy" class="diff-btn">쉬움</label>
                <input type="radio" id="normal" name="difficulty" value="normal" checked>
                <label for="normal" class="diff-btn">보통</label>
                <input type="radio" id="hard" name="difficulty" value="hard">
                <label for="hard" class="diff-btn">어려움</label>
            </div>

            <!-- 플레이어 수 선택 -->
            <div class="difficulty-options" style="margin-bottom: 40px; margin-top: -20px;">
                <input type="radio" id="p2" name="player_count" value="2" checked>
                <label for="p2" class="diff-btn">2인</label>
                <input type="radio" id="p3" name="player_count" value="3">
                <label for="p3" class="diff-btn">3인</label>
                <input type="radio" id="p4" name="player_count" value="4">
                <label for="p4" class="diff-btn">4인</label>
            </div>

            <button class="start-btn" id="start-btn">START</button>
        </div>
    </div>

    <div id="game-screen">
        <div class="round-table" id="round-table">
            <div class="bell-container" id="bell-btn"><div class="bell" id="bell-emoji">🛎️</div></div>
            <!-- 카드 위치들은 자바스크립트를 통해 동적 렌더링 됩니다 -->
        </div>
        <div id="alert-msg"></div>
    </div>

    <script>
        // 전역 상수 및 상태 객체
        const FRUITS = ['🍓', '🍌', '🍋', '🍇'];
        const JUDGE_TIMES = { 'easy': 2500, 'normal': 1500, 'hard': 700 };
        const MAX_CARDS = 50; // 기존 50장.

        // 다인용 위치 매핑 함수 (기준: 180=Bottom, 90=Left, 0=Top, 270=Right)
        function getSlotStyle(angleStr) {
            let A = parseInt(angleStr) - 180;
            return {
                deck: `top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(${A}deg) translateY(34vmin);`, 
                baseTransform: `translate(-50%, -50%) rotate(${A}deg)`,
                flip: `top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(${A}deg) translateY(16vmin);`, 
                // 원의 바깥쪽(방사형)이 아닌 양옆(접선 방향)에 배치해야 테이블 밖으로 잘리지 않습니다.
                counter: `top: 50%; left: 120%; transform: translateY(-50%) rotate(${-A}deg);`,
                animStart: `top: 50%; left: 50%;`
            };
        }

        let gameState = {
            players: [],
            numPlayers: 2,
            turnIdx: 0,
            phase: 'idle',
            difficulty: 'normal',
            judgeTime: 1500,
            aiTimeoutIds: [], // 카드 오픈 대기 타이머
            aiHitTimeoutIds: [] // 종치기 경쟁 타이머
        };

        const ui = {
            mainMenu: document.getElementById('main-menu'),
            gameScreen: document.getElementById('game-screen'),
            startBtn: document.getElementById('start-btn'),
            roundTable: document.getElementById('round-table'),
            alertMsg: document.getElementById('alert-msg'),
            bellBtn: null,
            bellEmoji: null
        };

        function showAlert(msg, color='#FFEB3B', duration=1500) {
            ui.alertMsg.textContent = msg;
            ui.alertMsg.style.color = color;
            ui.alertMsg.style.opacity = '1';
            ui.alertMsg.style.transform = 'translate(-50%, -50%) scale(1)';
            setTimeout(() => { 
                ui.alertMsg.style.opacity = '0'; 
                ui.alertMsg.style.transform = 'translate(-50%, -50%) scale(0.9)';
            }, duration);
        }

        function generateDeck() {
            let deck = [];
            for (let i = 0; i < MAX_CARDS; i++) {
                deck.push({
                    fruit: FRUITS[Math.floor(Math.random() * FRUITS.length)],
                    count: Math.floor(Math.random() * 5) + 1
                });
            }
            return deck;
        }

        // 게임 시작 및 테이블 초기화
        ui.startBtn.addEventListener('click', () => {
            let diffRadio = document.querySelector('input[name="difficulty"]:checked');
            gameState.difficulty = diffRadio ? diffRadio.value : 'normal';
            gameState.judgeTime = JUDGE_TIMES[gameState.difficulty];

            let pCountRadio = document.querySelector('input[name="player_count"]:checked');
            gameState.numPlayers = pCountRadio ? parseInt(pCountRadio.value) : 2;
            
            // 레이아웃 슬롯 각도 배정 (사용자: 180도 = 6시 방향 Bottom)
            let angleAssignments = [];
            if (gameState.numPlayers === 2) angleAssignments = [180, 0]; // Bottom, Top
            else if (gameState.numPlayers === 3) angleAssignments = [180, 60, 300]; // Bottom, Top-Right, Top-Left
            else if (gameState.numPlayers === 4) angleAssignments = [180, 270, 0, 90]; // Bottom, Right, Top, Left

            gameState.players = [];
            for(let i=0; i<gameState.numPlayers; i++) {
                gameState.players.push({
                    id: i,
                    type: i === 0 ? 'human' : 'ai',
                    deck: generateDeck(),
                    table: [],
                    isActive: true,
                    slotObj: getSlotStyle(angleAssignments[i])
                });
            }

            gameState.turnIdx = 0;
            gameState.phase = 'playing';
            clearAllTimeouts();

            setupTableUI();
            renderCards();

            ui.mainMenu.style.opacity = '0';
            setTimeout(() => {
                ui.mainMenu.style.display = 'none';
                ui.gameScreen.style.display = 'flex';
                // 첫번째 턴 AI일 경우 동작 시작
                if(gameState.players[gameState.turnIdx].type === 'ai') checkAndTriggerAI();
            }, 500);
        });

        function setupTableUI() {
            ui.roundTable.innerHTML = `<div class="bell-container" id="bell-btn"><div class="bell" id="bell-emoji">🛎️</div></div>`;
            ui.bellBtn = document.getElementById('bell-btn');
            ui.bellEmoji = document.getElementById('bell-emoji');
            
            ui.bellBtn.addEventListener('mousedown', () => { handleBellHit(0); });

            // DOM 생성
            for(let i=0; i<gameState.numPlayers; i++) {
                let slot = gameState.players[i].slotObj;
                let html = `
                    <div class="deck" id="deck-${i}" style="${slot.deck} transition: box-shadow 0.2s;">
                        <div class="card-count" id="count-${i}" style="${slot.counter}">50</div>
                    </div>
                    <div class="flipped-card" id="flipped-${i}" style="${slot.flip}"></div>
                `;
                ui.roundTable.insertAdjacentHTML('beforeend', html);

                if(i === 0) {
                    document.getElementById(`deck-0`).addEventListener('click', () => {
                        if(gameState.turnIdx === 0 && gameState.phase === 'playing' && gameState.players[0].isActive) {
                            playCard(0);
                        }
                    });
                }
            }
        }

        function clearAllTimeouts() {
            gameState.aiTimeoutIds.forEach(id => clearTimeout(id));
            gameState.aiHitTimeoutIds.forEach(id => clearTimeout(id));
            gameState.aiTimeoutIds = [];
            gameState.aiHitTimeoutIds = [];
        }

        function renderCards() {
            for(let i=0; i<gameState.numPlayers; i++) {
                let p = gameState.players[i];
                let deckEl = document.getElementById(`deck-${i}`);
                let countEl = document.getElementById(`count-${i}`);
                let flippedEl = document.getElementById(`flipped-${i}`);

                countEl.textContent = p.deck.length;

                // 파산 체크
                if(p.deck.length === 0 && p.table.length === 0) {
                    p.isActive = false;
                }

                if(!p.isActive || p.deck.length === 0) {
                    deckEl.style.display = 'none';
                } else {
                    deckEl.style.display = 'flex';
                }

                // 바닥 카드 렌더링
                flippedEl.innerHTML = '';
                // 애니메이션 연동을 위해 임시 제거 
                flippedEl.style.transition = 'none';
                flippedEl.style.opacity = '1';

                if(p.table.length === 0) {
                    flippedEl.style.display = 'none';
                } else {
                    flippedEl.style.display = 'flex';
                    let topCard = p.table[p.table.length - 1];
                    let html = '';
                    for(let j=0; j<topCard.count; j++){ html += `<div class="f-fruit">${topCard.fruit}</div>`; }
                    flippedEl.innerHTML = html;
                }

                // 스포트라이트 (턴)
                if(gameState.phase === 'playing' && gameState.turnIdx === i && p.isActive) {
                    // !important 대신 style 객체 직접 수정
                    deckEl.style.boxShadow = '0 0 30px 15px rgba(255, 235, 59, 0.8)';
                } else {
                    deckEl.style.boxShadow = '';
                }
            }
            checkGameOver();
        }

        // 게임 승패 판정
        function checkGameOver() {
            if (gameState.phase === 'gameover') return;

            let userActive = gameState.players[0].isActive;
            let aliveAIs = 0;
            for(let i=1; i<gameState.numPlayers; i++) {
                if(gameState.players[i].isActive) aliveAIs++;
            }

            if (!userActive) {
                gameState.phase = 'gameover';
                clearAllTimeouts();
                showAlert('패배! 카드를 모두 잃으셨습니다.', '#F44336', 3000);
                setTimeout(() => { location.reload(); }, 3000);
            } else if (aliveAIs === 0) {
                gameState.phase = 'gameover';
                clearAllTimeouts();
                showAlert('🏆 승리! 최후의 1인이 되셨습니다!', '#4CAF50', 4000);
                setTimeout(() => { location.reload(); }, 4000);
            }
        }

        // 턴 넘기기 (파산한 사람 건너뜀)
        function advanceTurn() {
            let nextTry = 0;
            do {
                gameState.turnIdx = (gameState.turnIdx + 1) % gameState.numPlayers;
                nextTry++;
                if (nextTry > gameState.numPlayers) break; // 모두 파산 (게임 종료)
            } while(!gameState.players[gameState.turnIdx].isActive || gameState.players[gameState.turnIdx].deck.length === 0);
        }

        // 카드 뒤집기
        function playCard(playerIdx) {
            if(gameState.phase !== 'playing') return;
            if(playerIdx !== gameState.turnIdx) return;
            let p = gameState.players[playerIdx];

            if(p.deck.length === 0) return;

            clearAllTimeouts();

            // 카드 내기 애니메이션 트리거
            let flippedEl = document.getElementById(`flipped-${playerIdx}`);
            let slot = p.slotObj;
            
            // CSS 애니메이션용 인라인 트랜지션
            flippedEl.style.display = 'flex';
            flippedEl.style.transition = 'none';
            // 시작점(덱) 위치
            flippedEl.style.cssText = `position: absolute; ${slot.animStart} transform: ${slot.baseTransform} translateY(34vmin) rotateY(180deg) scale(0.5); opacity: 0; z-index: 6; display: flex; flex-wrap: wrap; align-content: center; justify-content: center; gap: 2px; padding: 2px;  border: 4px solid #ccc; background-color: white; border-radius: 8px; font-size: 2rem; overflow: hidden;`;
            // reflow
            void flippedEl.offsetWidth;

            let card = p.deck.pop();
            p.table.push(card);
            
            // 실제 렌더링
            renderCards();

            // 도착점 복원
            flippedEl.style.transition = 'all 0.3s ease-out';
            flippedEl.style.cssText = `position: absolute; ${slot.flip} z-index: 6; display: flex; flex-wrap: wrap; align-content: center; justify-content: center; gap: 2px; padding: 2px; border: 4px solid #ccc; background-color: white; border-radius: 8px; font-size: 2rem; overflow: hidden; opacity: 1;`;

            advanceTurn();
            checkAndTriggerAI();
            renderCards();
        }

        function isFruitSumFive() {
            let counts = { '🍓':0, '🍌':0, '🍋':0, '🍇':0 };
            for(let i=0; i<gameState.numPlayers; i++) {
                let p = gameState.players[i];
                if(p.isActive && p.table.length > 0) {
                    let card = p.table[p.table.length - 1];
                    counts[card.fruit] += card.count;
                }
            }
            for(let f in counts) { if(counts[f] === 5) return true; }
            return false;
        }

        // 다중 AI 경쟁 타이머 처리
        function checkAndTriggerAI() {
            clearAllTimeouts();

            let isFive = isFruitSumFive();

            if (isFive) {
                // 1) 5개 정답 상황: 살아있는 모든 AI들이 앞다투어 종치기 경쟁
                for(let i=1; i<gameState.numPlayers; i++) {
                    let ai = gameState.players[i];
                    if(ai.isActive) {
                        // 각 AI마다 반응속도를 고유하게 굴림 (0.3 ~ 1.0 배수)
                        let reactionTime = gameState.judgeTime * (0.3 + Math.random() * 0.7);
                        let tid = setTimeout(() => {
                            handleBellHit(i);
                        }, reactionTime);
                        gameState.aiHitTimeoutIds.push(tid);
                    }
                }
                return; // 카드 내지 않음
            }

            // 2) 일반 상황 (카드를 내야 할 턴인 AI)
            let currentP = gameState.players[gameState.turnIdx];
            if (currentP.type === 'ai') {
                let delay = 600 + Math.random() * 800; // 0.6초 ~ 1.4초 대기 (다인용이므로 약간 앞당김)
                let tid = setTimeout(() => {
                    playCard(gameState.turnIdx);
                }, delay);
                gameState.aiTimeoutIds.push(tid);
            }
        }

        function handleBellHit(hitterIdx) {
            if (gameState.phase !== 'playing') return;
            if (!gameState.players[hitterIdx].isActive) return; // 파산자는 종치기 금지

            // 시각 효과
            ui.bellEmoji.classList.add('active');
            setTimeout(() => ui.bellEmoji.classList.remove('active'), 150);

            // 우선 종을 친 사람이 나왔으므로 타 AI들의 대기열 전부 소멸 (단호한 판정 규칙)
            clearAllTimeouts();

            let hitter = gameState.players[hitterIdx];

            if (isFruitSumFive()) {
                // 승리!
                let msg = hitter.type === 'human' ? '정답!' : `AI ${hitterIdx} 획득!`;
                let color = hitter.type === 'human' ? '#4CAF50' : '#FF9800';
                showAlert(msg, color, 1500);
                gameState.phase = 'penalty';

                setTimeout(() => {
                    // 모든 바닥 카드를 수거
                    let allCards = [];
                    for(let i=0; i<gameState.numPlayers; i++) {
                        allCards = allCards.concat(gameState.players[i].table);
                        gameState.players[i].table = [];
                    }
                    
                    hitter.deck = allCards.concat(hitter.deck);
                    gameState.turnIdx = hitterIdx; // 승자가 먼저 시작
                    
                    gameState.phase = 'playing';
                    renderCards();
                    if(hitter.type === 'ai') checkAndTriggerAI();
                }, 1000);
            } else {
                // 오답 패널티: 할리갈리 원본 규칙 (자신의 남은 카드를 다른 모든 플레이어에게 1장씩 분배)
                let msg = hitter.type === 'human' ? '오답! 패널티' : `AI ${hitterIdx} 실수!`;
                showAlert(msg, '#F44336', gameState.judgeTime);
                gameState.phase = 'penalty';

                setTimeout(() => {
                    // 패널티 분배 로직
                    for(let i=0; i<gameState.numPlayers; i++) {
                        let p = gameState.players[i];
                        if (i !== hitterIdx && p.isActive && hitter.deck.length > 0) {
                            let penaltyCard = hitter.deck.pop();
                            // 분배받은 카드를 남의 덱 맨 아래에 넣어줌
                            p.deck.unshift(penaltyCard);
                        }
                    }

                    // 오답자가 카드를 다 쓰고 파산한 경우
                    if(hitter.deck.length === 0 && hitter.table.length === 0) {
                        hitter.isActive = false;
                    }

                    // 턴은 종사고친 녀석의 다음 사람
                    advanceTurn();
                    gameState.phase = 'playing';
                    renderCards();
                    checkAndTriggerAI();
                }, gameState.judgeTime);
            }
        }

        // 스페이스바 처리
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (ui.gameScreen.style.display === 'flex' && gameState.phase === 'playing') {
                    if(!ui.bellEmoji.classList.contains('active')) {
                        handleBellHit(0);
                    }
                }
            }
        });
    </script>
</body>
</html>
